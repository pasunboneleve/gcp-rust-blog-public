root = "."
debounce_ms = 300
state_file = "./.devloop/state.json"
startup_workflows = ["startup"]

[watch.rust]
paths = ["src/**/*.rs", "Cargo.toml", "content/layout.html", "content/banner.html", "content/site.toml"]
workflow = "rust"

[watch.content]
paths = ["content/**/*.md", "content/**/*.html"]
workflow = "content"

[process.css_watch]
command = ["tailwindcss", "-i", "tailwind.css", "-o", "content/static/tailwind.css", "--watch=always"]
cwd = "."
autostart = false

[process.server]
command = ["cargo", "run"]
cwd = "."
autostart = false
env = { PORT = "8080" }
restart = "always"

[process.server.readiness]
kind = "http"
url = "http://127.0.0.1:8080/"
interval_ms = 500
timeout_ms = 30000

[process.tunnel]
command = ["cloudflared", "tunnel", "--url", "http://127.0.0.1:8080"]
cwd = "."
autostart = false
restart = "always"
output = { inherit = true, rules = [{ state_key = "tunnel_url", extract = "url_token" }] }

[process.tunnel.readiness]
kind = "state_key"
key = "tunnel_url"
interval_ms = 250
timeout_ms = 30000

[hook.build_css]
command = ["./scripts/build-css.sh"]
cwd = "."

[hook.current_post_slug]
command = ["./scripts/current-post-slug.sh"]
cwd = "."
env = { PORT = "8080" }
capture = "text"
state_key = "current_post_slug"

[workflow.publish_post_url]
steps = [
  { action = "wait_for_process", process = "tunnel" },
  { action = "write_state", key = "current_post_url", value = "{{tunnel_url}}/posts/{{current_post_slug}}" },
  { action = "log", message = "current post url: {{current_post_url}}" },
]

[workflow.startup]
steps = [
  { action = "start_process", process = "css_watch" },
  { action = "start_process", process = "server" },
  { action = "wait_for_process", process = "server" },
  { action = "run_hook", hook = "build_css" },
  { action = "run_hook", hook = "current_post_slug" },
  { action = "start_process", process = "tunnel" },
  { action = "run_workflow", workflow = "publish_post_url" },
]

[workflow.rust]
steps = [
  { action = "restart_process", process = "server" },
  { action = "wait_for_process", process = "server" },
  { action = "run_hook", hook = "build_css" },
  { action = "run_hook", hook = "current_post_slug" },
  { action = "restart_process", process = "tunnel" },
  { action = "run_workflow", workflow = "publish_post_url" },
]

[workflow.content]
steps = [
  { action = "run_hook", hook = "current_post_slug" },
  { action = "restart_process", process = "tunnel" },
  { action = "run_workflow", workflow = "publish_post_url" },
]
