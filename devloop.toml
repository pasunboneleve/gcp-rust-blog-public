root = "."
debounce_ms = 300
state_file = "./.devloop/state.json"
startup_workflows = ["startup"]

[watch.rust]
paths = ["src/**/*.rs", "Cargo.toml", "content/banner.html", "content/site.toml"]
workflow = "rust"

[watch.content]
paths = ["content/**/*.md", "content/**/*.html"]
workflow = "content"

[watch.css_source]
paths = ["tailwind.css"]
workflow = "css_source"

[process.server]
command = ["cargo", "run"]
cwd = "."
autostart = false
env = { PORT = "$CONTAINER_PORT" }
restart = "always"
output = { inherit = false }

[process.server.readiness]
kind = "http"
url = "http://127.0.0.1:$CONTAINER_PORT/"
interval_ms = 500
timeout_ms = 30000

[process.tunnel]
command = ["cloudflared", "tunnel", "--url", "http://127.0.0.1:$CONTAINER_PORT"]
cwd = "."
autostart = false
restart = "always"
output = { inherit = true, body_style = "dim", rules = [{ state_key = "tunnel_url", extract = "url_token" }] }

[process.tunnel.readiness]
kind = "state_key"
key = "tunnel_url"
interval_ms = 250
timeout_ms = 30000

[process.chromium-mcp]
command = [
  "chromium-browser",
  "--remote-debugging-port=9222",
  "--user-data-dir=.devloop/chromium-mcp-profile",
  "--new-window",
  "--incognito",
  "--disable-gpu",
  "--disable-background-networking",
  "--disable-sync",
  "--no-first-run",
  "--no-default-browser-check",
  "--log-level=3",
  "http://localhost:$CONTAINER_PORT",
]
cwd = "."
autostart = false
restart = "never"
output = { inherit = true, body_style = "dim" }

[process.chromium-mcp.readiness]
kind = "http"
url = "http://127.0.0.1:9222/json/version"
interval_ms = 500
timeout_ms = 30000

[hook.build_css]
command = ["./scripts/build-css.sh"]
cwd = "."

[hook.current_browser_path]
command = ["./scripts/current-browser-path.sh"]
cwd = "."
env = { PORT = "$CONTAINER_PORT" }
capture = "text"
state_key = "current_browser_path"

[event.browser_path]
state_key = "current_browser_path"
workflow = "publish_post_url"
pattern = "^/(|posts/[a-z0-9-]+)$"

[workflow.publish_post_url]
steps = [
  { action = "wait_for_process", process = "tunnel" },
  { action = "write_state", key = "current_post_url", value = "{{tunnel_url}}{{current_browser_path}}" },
  { action = "log", message = "current post url: {{current_post_url}}", style = "boxed" },
]

[workflow.startup]
steps = [
  { action = "run_hook", hook = "build_css" },
  { action = "start_process", process = "server" },
  { action = "wait_for_process", process = "server" },
  { action = "run_hook", hook = "current_browser_path" },
  { action = "start_process", process = "tunnel" },
  { action = "run_workflow", workflow = "publish_post_url" },
  { action = "start_process", process = "chromium-mcp" },
  { action = "wait_for_process", process = "chromium-mcp" },
]

[workflow.rust]
steps = [
  { action = "restart_process", process = "server" },
  { action = "wait_for_process", process = "server" },
  { action = "run_hook", hook = "current_browser_path" },
  { action = "run_workflow", workflow = "publish_post_url" },
]
triggers = ["browser_reload"]

[workflow.content]
steps = [
  { action = "restart_process", process = "server" },
  { action = "wait_for_process", process = "server" },
  { action = "run_hook", hook = "current_browser_path" },
  { action = "run_workflow", workflow = "publish_post_url" },
]
triggers = ["browser_reload"]

[workflow.css_source]
steps = [
  { action = "run_hook", hook = "build_css" },
]
triggers = ["browser_reload"]

[workflow.browser_reload]
steps = [
  { action = "notify_reload" },
]
