<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png?v=1" />
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png?v=1" />
    <link rel="icon" href="/favicon.ico?v=1" type="image/x-icon" />
    <link rel="shortcut icon" href="/favicon.ico?v=1" type="image/x-icon" />
    <title>GCP Rust Blog</title>
    <link rel="stylesheet" href="/static/tailwind.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.25/dist/katex.min.css"
    />
    <style>
      .prose {
        --color-base2: #eee8d5;
        --tw-prose-body: var(--color-base2);
        --tw-prose-headings: var(--color-base2);
        --tw-prose-lead: var(--color-base1);
        --tw-prose-links: var(--color-blue);
        --tw-prose-bold: var(--color-base2);
        --tw-prose-counters: var(--color-base1);
        --tw-prose-bullets: var(--color-base01);
        --tw-prose-hr: var(--color-base01);
        --tw-prose-quotes: var(--color-base1);
        --tw-prose-quote-borders: var(--color-base01);
        --tw-prose-captions: var(--color-base1);
        --tw-prose-kbd: var(--color-base1);
        --tw-prose-kbd-shadows: color-mix(in oklab, var(--color-base1) 10%, transparent);
        --tw-prose-code: var(--color-cyan);
        --tw-prose-pre-code: var(--color-base2);
        --tw-prose-pre-bg: var(--color-base02);
        --tw-prose-th-borders: var(--color-base01);
        --tw-prose-td-borders: var(--color-base01);
      }

      .page-layout {
        align-items: flex-start;
      }

      .content-main {
        flex: 1 1 auto;
        min-width: 0;
      }

      .mermaid-block {
        margin: 1.5rem 0;
        padding: 0.75rem;
        border-radius: 0.5rem;
        background: transparent;
      }

      .mermaid {
        padding: 0;
        border-radius: 0.4rem;
        background: transparent;
      }

      .mermaid svg {
        display: block;
        max-width: 100%;
        height: auto;
        margin: 0 auto;
      }

    </style>
  </head>
  <body class="h-full bg-base03 text-base0 font-sans m-0">
    {{ banner }}
    <div class="page-layout flex">
      <main class="content-main max-w-4xl mx-auto my-16 px-4 prose">{{ content }}</main>
      <aside class="w-64 bg-gradient-to-b from-base02 to-transparent p-4">
        <h3 class="mt-4">Posts</h3>
        <ul>
          {{ posts }}
        </ul>
      </aside>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"
      integrity="sha384-jFhLSLFn4m565eRAS0CDMWubMqOtfZWWbE8kqgGdU+VHbJ3B2G/4X8u+0BM8MtdU"
      crossorigin="anonymous">
    </script>
    <script>
      const mermaidBlocks = document.querySelectorAll("pre > code.language-mermaid");
      if (mermaidBlocks.length > 0 && typeof mermaid !== "undefined") {
        mermaid.initialize({
          startOnLoad: false,
          theme: "base",
          flowchart: { useMaxWidth: true, htmlLabels: true },
          themeVariables: {
            fontSize: "18px",
            lineColor: "#93a1a1",
            primaryBorderColor: "#2aa198",
            primaryTextColor: "#eee8d5",
            primaryColor: "#073642",
            clusterBorder: "#2aa198",
            edgeLabelBackground: "#002b36",
          },
        });

        for (const block of mermaidBlocks) {
          const wrapper = document.createElement("figure");
          wrapper.className = "mermaid-block";

          const container = document.createElement("div");
          container.className = "mermaid";
          container.textContent = block.textContent ?? "";

          wrapper.appendChild(container);

          const pre = block.closest("pre");
          if (pre) {
            pre.before(wrapper);
            pre.hidden = true;
          }
        }
        mermaid.run({ querySelector: ".mermaid" }).catch((err) => {
          console.error("Mermaid render failed", err);
        });
      }
    </script>
  </body>
</html>
