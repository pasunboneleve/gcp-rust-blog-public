<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Local versus tangled change surface</title>
  <desc id="desc">Side-by-side comparison where one edit stays local in a modular system while one edit triggers ripple effects in a tangled system.</desc>

  <defs>
    <style>
      .bg { fill: #002b36; }
      .panel { fill: #073642; stroke-width: 3; }
      .text { fill: #eee8d5; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .muted { fill: #93a1a1; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .edge-good { stroke: #2aa198; stroke-width: 3; }
      .edge-bad { stroke: #dc322f; stroke-width: 3; }
      .ripple { stroke: #dc322f; stroke-width: 3; stroke-dasharray: 7 6; }
    </style>
    <marker id="impact" markerUnits="userSpaceOnUse" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc322f" />
    </marker>
  </defs>

  <rect class="bg" width="1200" height="780" rx="20" />

  <text class="text" x="310" y="70" text-anchor="middle" font-size="48">Local change surface</text>
  <text class="text" x="890" y="70" text-anchor="middle" font-size="48">Tangled change surface</text>

  <rect class="panel" x="60" y="110" width="500" height="620" rx="26" stroke="#2aa198" />
  <rect class="panel" x="640" y="110" width="500" height="620" rx="26" stroke="#dc322f" />

  <rect x="130" y="190" width="140" height="85" rx="12" fill="#09424f" stroke="#2aa198" stroke-width="2" />
  <rect x="350" y="190" width="140" height="85" rx="12" fill="#09424f" stroke="#2aa198" stroke-width="2" />
  <rect x="130" y="320" width="140" height="85" rx="12" fill="#09424f" stroke="#2aa198" stroke-width="2" />
  <rect x="350" y="320" width="140" height="85" rx="12" fill="#09424f" stroke="#2aa198" stroke-width="2" />

  <rect x="240" y="500" width="140" height="90" rx="14" fill="#0b4f5e" stroke="#b58900" stroke-width="4" />
  <text class="text" x="310" y="556" text-anchor="middle" font-size="34">Edit</text>
  <line class="edge-good" x1="310" y1="500" x2="310" y2="430" />

  <text class="muted" x="310" y="640" text-anchor="middle" font-size="24">Change stays local</text>
  <text class="muted" x="310" y="675" text-anchor="middle" font-size="24">Few dependencies, fast verification</text>

  <rect x="700" y="175" width="120" height="70" rx="10" fill="#5c2a2a" stroke="#dc322f" stroke-width="2" />
  <rect x="880" y="175" width="120" height="70" rx="10" fill="#5c2a2a" stroke="#dc322f" stroke-width="2" />

  <rect x="700" y="300" width="120" height="70" rx="10" fill="#5c2a2a" stroke="#dc322f" stroke-width="2" />
  <rect x="880" y="300" width="120" height="70" rx="10" fill="#5c2a2a" stroke="#dc322f" stroke-width="2" />

  <rect x="700" y="425" width="120" height="70" rx="10" fill="#5c2a2a" stroke="#dc322f" stroke-width="2" />
  <rect x="880" y="425" width="120" height="70" rx="10" fill="#5c2a2a" stroke="#dc322f" stroke-width="2" />

  <rect x="790" y="530" width="140" height="95" rx="14" fill="#7a3232" stroke="#b58900" stroke-width="4" />
  <text class="text" x="860" y="588" text-anchor="middle" font-size="34">Edit</text>

  <line class="edge-bad" x1="760" y1="245" x2="760" y2="300" />
  <line class="edge-bad" x1="940" y1="245" x2="940" y2="300" />
  <line class="edge-bad" x1="760" y1="370" x2="760" y2="425" />
  <line class="edge-bad" x1="940" y1="370" x2="940" y2="425" />
  <line class="edge-bad" x1="820" y1="335" x2="880" y2="335" />
  <line class="edge-bad" x1="820" y1="460" x2="880" y2="460" />
  <line class="edge-bad" x1="760" y1="495" x2="820" y2="530" />
  <line class="edge-bad" x1="940" y1="495" x2="900" y2="530" />

  <line class="ripple" x1="860" y1="530" x2="760" y2="460" marker-end="url(#impact)" />
  <line class="ripple" x1="860" y1="530" x2="940" y2="460" marker-end="url(#impact)" />
  <line class="ripple" x1="860" y1="530" x2="820" y2="335" marker-end="url(#impact)" />

  <text class="muted" x="890" y="640" text-anchor="middle" font-size="24">One edit triggers ripple effects</text>
  <text class="muted" x="890" y="675" text-anchor="middle" font-size="24">Broad dependency graph, higher risk</text>
</svg>
