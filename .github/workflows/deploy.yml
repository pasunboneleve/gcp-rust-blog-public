name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "docs/**/*.md"
      - "infra/**"
      - "scripts/**"

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GCP_SERVICE_NAME: ${{ secrets.GCP_SERVICE_NAME }}
  GCP_REPO: ${{ secrets.GCP_REPO }}

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Google Auth
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.GCP_WORKLOAD_IDENTITY_POOL }}/providers/${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
        service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
        audience: 'sts.googleapis.com'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Detect content-only change
      id: change_scope
      run: |
        set -euo pipefail
        BEFORE="${{ github.event.before }}"
        CURRENT="${{ github.sha }}"

        if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
          echo "content_only=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        CHANGED="$(git diff --name-only "$BEFORE" "$CURRENT")"
        if [ -z "$CHANGED" ]; then
          echo "content_only=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        CONTENT_ONLY=true
        while IFS= read -r file; do
          case "$file" in
            content/*) ;;
            *) CONTENT_ONLY=false; break ;;
          esac
        done <<< "$CHANGED"

        echo "content_only=$CONTENT_ONLY" >> "$GITHUB_OUTPUT"

    - name: Set up Rust toolchain
      if: steps.change_scope.outputs.content_only != 'true'
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Run tests
      if: steps.change_scope.outputs.content_only != 'true'
      run: cargo test --all-targets

    - name: Run clippy
      if: steps.change_scope.outputs.content_only != 'true'
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Check for app-base image
      id: app_base
      if: steps.change_scope.outputs.content_only == 'true'
      run: |
        set -euo pipefail
        APP_BASE_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPO }}/${{ env.GCP_SERVICE_NAME }}:app-base"
        if docker pull "$APP_BASE_IMAGE" >/dev/null 2>&1; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Build and push app-base image
      if: steps.change_scope.outputs.content_only != 'true' || steps.app_base.outputs.available != 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        target: runtime-base
        push: true
        tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPO }}/${{ env.GCP_SERVICE_NAME }}:app-base
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push full container image
      if: steps.change_scope.outputs.content_only != 'true' || steps.app_base.outputs.available != 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPO }}/${{ env.GCP_SERVICE_NAME }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push content-only container image
      if: steps.change_scope.outputs.content_only == 'true' && steps.app_base.outputs.available == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: .github/docker/content-overlay.Dockerfile
        push: true
        build-args: |
          BASE_IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPO }}/${{ env.GCP_SERVICE_NAME }}:app-base
        tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPO }}/${{ env.GCP_SERVICE_NAME }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to Cloud Run
      run: |-
        gcloud run deploy "$GCP_SERVICE_NAME" \
          --image "${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPO }}/${{ env.GCP_SERVICE_NAME }}:${{ github.sha }}" \
          --region "$GCP_REGION" \
          --allow-unauthenticated \
          --port 8080 \
          --ingress all \
          --project "$GCP_PROJECT_ID"
