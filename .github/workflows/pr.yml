name: PR

on:
  pull_request:

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Run tests
      run: cargo test --all-targets

    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
